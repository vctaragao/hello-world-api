name: Build and Deploy to GKE

on:
  push:
    branches:
      - main
  issue_comment:
    types:
      - created

jobs:
  build-publish-deploy:
    if: >-
      github.event_name == 'push' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.body == '.deploy'
      )
    name: Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || 'development' }}
    env:
      TARGET_ENVIRONMENT: ${{ github.event_name == 'push' && 'production' || 'development' }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      GAR_LOCATION: ${{ vars.GAR_LOCATION }}
      GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
      GKE_LOCATION: ${{ vars.GKE_LOCATION }}
      DEPLOYMENT_NAME: ${{ vars.DEPLOYMENT_NAME }}
      REPOSITORY: ${{ vars.REPOSITORY }}
      IMAGE: ${{ vars.IMAGE }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
      SERVICE_ACCOUNT: ${{ vars.SERVICE_ACCOUNT }}

    permissions:
      contents: read
      id-token: write
      pull-requests: read

    steps:
      - id: pr
        name: Resolve pull request revision
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            if (pr.data.state !== 'open') {
              core.setFailed('Only open pull requests can be deployed to development.');
              return;
            }

            if (pr.data.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              core.setFailed('Pull request deployments from forks are not allowed.');
              return;
            }

            core.setOutput('sha', pr.data.head.sha);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && steps.pr.outputs.sha || github.sha }}

      - name: Validate workflow configuration
        run: |
          set -euo pipefail
          missing=0

          for var_name in \
            PROJECT_ID \
            GAR_LOCATION \
            GKE_CLUSTER \
            GKE_LOCATION \
            DEPLOYMENT_NAME \
            REPOSITORY \
            IMAGE \
            WORKLOAD_IDENTITY_PROVIDER \
            SERVICE_ACCOUNT
          do
            if [ -z "${!var_name}" ]; then
              echo "Missing required GitHub environment variable: ${var_name}" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Configure the missing values in GitHub Environment vars for this target environment." >&2
            exit 1
          fi

          echo "Deploying with GitHub environment: $TARGET_ENVIRONMENT"

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Authenticate Docker to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}

      - name: Build and push Docker image
        env:
          DOCKER_TAG: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.event_name == 'issue_comment' && steps.pr.outputs.sha || github.sha }}
        run: |
          set -euo pipefail
          docker build --tag "$DOCKER_TAG" .
          docker push "$DOCKER_TAG"

      - name: Install kustomize
        run: |
          set -euo pipefail
          curl -sSfL \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz \
            -o /tmp/kustomize.tar.gz
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          chmod +x /tmp/kustomize
          sudo mv /tmp/kustomize /usr/local/bin/kustomize

      - name: Deploy to GKE
        working-directory: k8s
        env:
          DOCKER_TAG: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.event_name == 'issue_comment' && steps.pr.outputs.sha || github.sha }}
        run: |
          set -euo pipefail
          kustomize edit set image APP_IMAGE="$DOCKER_TAG"
          kustomize build . | kubectl apply -f -
          kubectl rollout status deployment/"$DEPLOYMENT_NAME"
          kubectl get services -o wide
