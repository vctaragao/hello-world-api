apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-world-kong-route
  annotations:
    konghq.com/plugins: hello-world-jwt-auth
spec:
  parentRefs:
    - kind: Gateway
      name: shared-kong-gateway
      namespace: kong
  hostnames:
    - api.moraes.lat
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /hello-world
      backendRefs:
        - name: hello-world-api
          port: 80
